<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Article | Cindy Ng &amp; Co.</title>
<meta name="description" content="Legal article by Cindy Ng & Co., Advocates & Solicitors in Malaysia." />
<meta name="theme-color" content="#fcfbf7" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;0,9..144,600;1,9..144,400&family=Archivo:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
  :root{--paper:#fcfbf7;--paper-2:#ffffff;--parchment:#182a4e;--ivory:#2c3550;--muted:#55607c;--muted-2:#6d7690;--gold:#95660a;--gold-deep:#7a5306;--line:rgba(149,102,10,.36);--line-soft:rgba(149,102,10,.16);--maxw:960px;--display:"Fraunces",Georgia,serif;--body:"Archivo",system-ui,-apple-system,sans-serif}
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--paper);color:var(--ivory);font-family:var(--body);line-height:1.75;-webkit-font-smoothing:antialiased}
  a{color:inherit;text-decoration:none}.wrap{max-width:1180px;margin:0 auto;padding:0 28px}.article-wrap{max-width:var(--maxw);margin:0 auto;padding:0 28px}
  header{position:sticky;top:0;z-index:20;background:rgba(252,251,247,.94);backdrop-filter:blur(10px);border-bottom:1px solid var(--line-soft)}
  .nav{height:74px;display:flex;align-items:center;justify-content:space-between;gap:22px}.brand{display:flex;flex-direction:column;line-height:1}.brand .name{font-family:var(--display);font-size:1.08rem;color:var(--parchment)}.brand .sub{font-size:.6rem;letter-spacing:.34em;text-transform:uppercase;color:var(--muted);margin-top:6px}
  .nav-links{display:flex;align-items:center;gap:28px}.nav-links a{font-size:.76rem;letter-spacing:.13em;text-transform:uppercase;color:var(--muted);font-weight:600}.nav-links a:hover{color:var(--gold)}
  .hero{padding:clamp(58px,9vw,98px) 0 44px;border-bottom:1px solid var(--line-soft)}.back{display:inline-block;margin-bottom:28px;color:var(--gold-deep);font-size:.76rem;letter-spacing:.16em;text-transform:uppercase;font-weight:600}.meta{font-size:.72rem;letter-spacing:.18em;text-transform:uppercase;color:var(--gold);font-weight:600}
  h1,h2{font-family:var(--display);font-weight:400;line-height:1.1;color:var(--parchment)}h1{font-size:clamp(2.25rem,5vw,4.4rem);margin-top:18px}.summary{max-width:760px;margin-top:20px;color:var(--muted);font-size:1.08rem}
  article{padding:48px 0 88px}.section{background:var(--paper-2);border:1px solid var(--line-soft);padding:clamp(26px,4vw,40px);margin-bottom:20px}.section h2{font-size:1.65rem;margin-bottom:14px}.section p{color:var(--ivory);margin-top:12px}.disclaimer{margin-top:34px;color:var(--muted-2);font-size:.92rem}
  footer{border-top:1px solid var(--line-soft);padding:30px 0;color:var(--muted-2);font-size:.86rem}footer .wrap{display:flex;justify-content:space-between;gap:18px;flex-wrap:wrap}
  @media(max-width:760px){.nav{height:auto;align-items:flex-start;padding:18px 0;flex-direction:column}.nav-links{gap:16px;flex-wrap:wrap}.section{padding:24px}}
</style>
</head>
<body>
<header><div class="wrap"><nav class="nav" aria-label="Primary"><a class="brand" href="../../" aria-label="Cindy Ng & Co. home"><span class="name">Cindy Ng &amp; Co.</span><span class="sub">Advocates &amp; Solicitors</span></a><div class="nav-links"><a href="../../#about">About</a><a href="../../#practice">Practice</a><a href="../">Articles</a><a href="../../#enquiry">Contact</a></div></nav></div></header>
<main>
  <section class="hero"><div class="article-wrap"><a class="back" href="../">Back to Articles</a><div id="articleHero"></div></div></section>
  <article><div class="article-wrap" id="articleBody"></div></article>
</main>
<footer><div class="wrap"><span>&copy; 2026 Cindy Ng &amp; Co. (CNCO)</span><span><a href="../../#enquiry">Book a Consultation</a></span></div></footer>
<script src="../articles.js"></script>
<script>
  const slug = 'tenancy-agreement-basics';
  const article = (window.CNCO_ARTICLES || []).find(item => item.slug === slug);
  const hero = document.getElementById('articleHero');
  const body = document.getElementById('articleBody');
  const formatDate = value => new Date(value).toLocaleDateString('en-MY', {year:'numeric', month:'long', day:'numeric'});
  document.title = article.title + ' | Cindy Ng & Co.';
  document.querySelector('meta[name="description"]').setAttribute('content', article.summary);
  hero.innerHTML = `<span class="meta">${article.category} / ${formatDate(article.date)}</span><h1>${article.title}</h1><p class="summary">${article.summary}</p>`;
  body.innerHTML = article.body.map(section => `<section class="section"><h2>${section.heading}</h2>${section.paragraphs.map(paragraph => `<p>${paragraph}</p>`).join('')}</section>`).join('') + '<p class="disclaimer">This publication is for general information only and does not constitute legal advice.</p>';
</script>
</body>
</html>
